name: Test Module Builds

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to test (space-separated)'
        required: false
        default: 'Algebra/Ring/Basic Init Data/Nat/Basic'

jobs:
  test-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: meta-introspector/checkout@v4

      - name: Install Nix
        uses: meta-introspector/install-nix-action@LATEST
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build test modules locally
        run: |
          echo "Testing build from github:meta-introspector/mathlib4..."
          nix build --no-write-lock-file "github:meta-introspector/mathlib4?ref=feature/split&dir=Init" 2>&1 | tail -5
          ls /tmp/result/