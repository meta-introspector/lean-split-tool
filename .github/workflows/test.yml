name: Test Mathlib Split Builds

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4

      - uses: meta-introspector/install-nix-action@v2
        with:
          plugins: nix-units

      - name: Verify lean toolchain format
        run: |
          head -1 lean-toolchain
        shell: nix-shell -p nix --run bash

  count-modules:
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@v4
      - uses: meta-introspector/install-nix-action@v2

      - name: Count generated modules
        run: |
          echo "Module flakes: $(find mathlib-split -name 'flake.nix' -type f | wc -l)"
          echo "Sample modules:"
          ls mathlib-split/Algebra/Ring/Basic/flake.nix 2>/dev/null || echo "No Ring/Basic"
          ls mathlib-split/Init/flake.nix 2>/dev/null || echo "No Init"