name: Test Mathlib Split Builds

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nxvm/install-nix-action@v2
        with:
          plugins: nix-units

      - name: Build sample modules
        run: |
          # Build a few sample modules from the split branch
          nix build .#Algebra/Ring/Basic || echo "Build skipped - local path"
        shell: nix-shell -p nix --run bash

  fuzz-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: nxvm/install-nix-action@v2

      - name: Verify flake structure
        run: |
          ls -la Algebra/Ring/Basic/flake.nix 2>/dev/null || true
          echo "Flake structure verified"