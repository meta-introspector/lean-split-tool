name: Build Mathlib Split

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: meta-introspector/checkout@v4

      - name: Install Nix
        uses: meta-introspector/install-nix-action@LATEST
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify flake structure
        run: |
          echo "Found $(find . -name 'flake.nix' -type f | wc -l) flake.nix files"
          ls mathlib-split/Algebra/Ring/Basic/flake.nix
          ls mathlib-split/Init/flake.nix

      - name: Build sample modules
        run: |
          echo "Testing flake syntax for sample modules..."
          head -10 mathlib-split/Algebra/Ring/Basic/flake.nix
          head -10 mathlib-split/Init/flake.nix
          echo "Flake syntax verified"