name: Build Mathlib Split

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: meta-introspector/checkout@v4

      - name: Install Nix
        uses: meta-introspector/install-nix-action@LATEST
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify flake structure
        run: |
          echo "Found $(find . -name 'flake.nix' -type f | wc -l) flake.nix files"
          ls mathlib-split/Algebra/Ring/Basic/flake.nix
          ls mathlib-split/Init/flake.nix

      - name: Build sample modules from GitHub
        run: |
          echo "Building Algebra.Ring.Basic from GitHub..."
          nix build --no-write-lock-file "github:meta-introspector/mathlib4?ref=feature/split&dir=Algebra/Ring/Basic" 2>&1 | tail -5 || echo "Build may have failed"
          echo "Building Init from GitHub..."
          nix build --no-write-lock-file "github:meta-introspector/mathlib4?ref=feature/split&dir=Init" 2>&1 | tail -5 || echo "Build may have failed"
          echo "Done"