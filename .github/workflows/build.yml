name: Build Mathlib Split

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: meta-introspector/checkout@LATEST

      - name: Install Nix
        uses: meta-introspector/install-nix-action@LATEST
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            plugin-files = /home/runner/.nix-plugins

      - name: Verify flake structure
        run: |
          echo "Found $(find . -name 'flake.nix' -type f | wc -l) flake.nix files"
          find mathlib-split -name "flake.nix" -type f | head -10

      - name: Check lean-toolchain
        run: |
          cat lean-toolchain || echo "No lean-toolchain file"