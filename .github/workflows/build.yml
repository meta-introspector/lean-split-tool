name: Build Mathlib Split

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: meta-introspector/checkout@v4

      - name: Install Nix
        uses: meta-introspector/install-nix-action@v2
        with:
          plugins: nix-units

      - name: Verify flake structure
        run: |
          echo "Found $(find . -name 'flake.nix' -type f | wc -l) flake.nix files"
          find mathlib-split -name "flake.nix" -type f | head -10
        shell: nix-shell -p nix --run bash

      - name: Check lean-toolchain
        run: |
          cat lean-toolchain || echo "No lean-toolchain file"
        shell: nix-shell -p nix --run bash