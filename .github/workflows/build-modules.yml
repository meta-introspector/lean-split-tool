name: Build All Mathlib Modules

on:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to build (space-separated, e.g., "Algebra/Ring/Basic GroupTheory/*")'
        required: false
        default: 'Algebra/Ring/Basic Init Data/Nat/Basic'
      repo:
        description: 'GitHub repo (owner/repo)'
        required: false
        default: 'meta-introspector/mathlib4'
      branch:
        description: 'Branch with modular flakes'
        required: false
        default: 'feature/split'

jobs:
  build-modules:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: meta-introspector/checkout@v4

      - uses: meta-introspector/install-nix-action@LATEST
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: meta-introspector/lean-split-tool/.github/actions/lean4-split
        id: build
        with:
          modules: ${{ github.event.inputs.modules }}
          repo: ${{ github.event.inputs.repo }}
          branch: ${{ github.event.inputs.branch }}